(function(){
  // Detecta se é dispositivo móvel (touchscreen / user-agent)
  var _isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || ('ontouchstart' in window);

  // No mobile: só bloqueia atalhos de teclado (improvável, mas por precaução)
  // A detecção por tamanho de janela NÃO roda no mobile pois as barras do browser
  // naturalmente causam diferença de outerHeight/innerHeight, gerando falsos positivos.
  var _devOpen = false;
  var _threshold = 200;

  function _check(){
    if(_isMobile) return; // mobile: nunca bloqueia por tamanho
    var w = window.outerWidth  - window.innerWidth  > _threshold;
    var h = window.outerHeight - window.innerHeight > _threshold;
    if(w || h){
      if(!_devOpen){
        _devOpen = true;
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#FFE600;font-family:Montserrat,sans-serif;"><div style="text-align:center;"><div style="font-size:48px;">🔒</div><div style="font-size:22px;font-weight:800;margin-top:12px;">Acesso Restrito</div><div style="font-size:14px;color:#555;margin-top:8px;">Ferramentas de desenvolvedor não permitidas.</div></div></div>';
      }
    } else {
      _devOpen = false;
    }
  }

  setInterval(_check, 800);

  // Bloqueia atalhos de teclado em qualquer dispositivo
  document.addEventListener('keydown', function(e){
    if(e.key==='F12' || (e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C')) || (e.ctrlKey&&e.key==='U')){
      e.preventDefault(); e.stopPropagation(); return false;
    }
  }, true);

  // Bloqueia menu de contexto só no desktop (no mobile atrapalha copiar texto)
  if(!_isMobile){
    document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
  }
})();
</script>

const ondaNum = o => { const m=String(o==null?"":o).match(/\d+/); return m?+m[0]:null; };
const targetFor = (cycle,onda) => { const n=ondaNum(onda); return (SCHEDULE[cycle]&&n&&SCHEDULE[cycle][n])||null; };
const hhmmFromTs = ts => { const d=new Date(ts); return d.getHours()*60+d.getMinutes(); };
// horário-corte do ciclo: alvo da onda; se a onda não for conhecida, usa a última onda do ciclo
const cutoffFor=(cycle,onda)=>{ const t=targetFor(cycle,onda); if(t)return t; const s=SCHEDULE[cycle]; if(!s)return null; let best=null,bestM=-1; for(const k in s){ const m=toMin(s[k]); if(m>bestM){bestM=m;best=s[k];} } return best; };
// info de atraso: quem chegou usa a hora real de chegada; quem ainda está a caminho fica "atrasado" se o horário-corte já passou
function delayInfo(r){

  if(r.arrTs){

    return { meta:t, lateMin, late:lateMin>0, status, earlyMin, antecipado:status==="antecipado", overdue:false, arrived:true };
  }
  if(r.status==="a_caminho"){
    const t=cutoffFor(r.cycle,r.onda); if(!t) return { meta:null };

}
const CARRIERS = ["ADO TRANSPORTES","A L C TRANSPORTES","BLD LOGÍSTICA","COOPMETRO","Nepomuceno","DHL","HELP ME SOLUCOES","CAXIENSE LOG","RodaCoop","PARCEIRO SPOT SOLUCOES","HAWK TRANSPORTES LTDA","BASEPEX ENCOM","DECARGO","Kangu Logistics","Transportadora Grupo Imediato"];

function carrierColor(name){ if(!name)return"#999"; const i=CARRIERS.indexOf(name); if(i>=0)return CARRIER_COLORS[i%CARRIER_COLORS.length]; let h=0; for(let k=0;k<name.length;k++)h=(h*31+name.charCodeAt(k))>>>0; return CARRIER_COLORS[h%CARRIER_COLORS.length]; }

const toMin = hhmm => { const [h,m]=String(hhmm).split(":").map(Number); return h*60+(m||0); };

function haversine(a,b,c,d){const t=x=>x*Math.PI/180;const dLat=t(c-a),dLng=t(d-b);const h=Math.sin(dLat/2)**2+Math.cos(t(a))*Math.cos(t(c))*Math.sin(dLng/2)**2;return Rt*2*Math.atan2(Math.sqrt(h),Math.sqrt(1-h));}

function bearing(a,b){const t=x=>x*Math.PI/180;const y=Math.sin(t(b.lng-a.lng))*Math.cos(t(b.lat));const x=Math.cos(t(a.lat))*Math.sin(t(b.lat))-Math.sin(t(a.lat))*Math.cos(t(b.lat))*Math.cos(t(b.lng-a.lng));return (Math.atan2(y,x)*180/Math.PI+360)%360;}

function playCallBeep(){ try{
  if(!_actx){ const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return; _actx=new AC(); }
  if(_actx.state==="suspended") _actx.resume();
  const t0=_actx.currentTime;

    o.type="sine"; o.frequency.setValueAtTime(880,t0+off); o.frequency.setValueAtTime(1174,t0+off+0.12);

    o.connect(g); g.connect(_actx.destination); o.start(t0+off); o.stop(t0+off+0.26); });
}catch(e){} }

const t2hm=ts=>{ if(!ts)return""; const d=new Date(num(ts)); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); };

function datesBetween(from,to){ const out=[]; const a=new Date(from+"T00:00:00"),b=new Date(to+"T00:00:00"); if(isNaN(a)||isNaN(b))return out; for(let d=new Date(a); d<=b && out.length<400; d.setDate(d.getDate()+1)) out.push(ymd(d)); return out; }
async function fbHistRows(from,to){ if(!fbDB)return[]; fbOnline(); const days=datesBetween(from,to); const snaps=await Promise.all(days.map(d=>fbDB.ref("historico/"+d).once("value").catch(()=>null))); const rows=[]; snaps.forEach((s,i)=>{ const day=days[i]; const v=s&&s.val(); if(v) Object.keys(v).forEach(k=>{ const h=v[k]||{}; h.sid=h.sid||k; if(carrierHidden(h.carrier)) return; rows.push(histToRow(h,day)); }); }); return rows; }

function App(){

  const [cfg,setCfg]=useState(DEFAULT_CFG);
  const [authed,setAuthed]=useState(()=>sessionStorage.getItem("cp_auth")==="1");

  useEffect(()=>{const c=sget("config");if(c)setCfg({...DEFAULT_CFG,...c,webapp:(c.webapp&&c.webapp.trim())||DEFAULT_CFG.webapp});},[]);
  const saveCfg=useCallback(n=>{setCfg(n);sset("config",n);},[]);
  const auth=()=>{sessionStorage.setItem("cp_auth","1");setAuthed(true);};
  const auth2=()=>{sessionStorage.setItem("cp_auth2","1");setAuthed2(true);};

    <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>
      <div style={{maxWidth:600,margin:"0 auto",minHeight:"100vh"}}>

function Gate({cfg,onOk,k,title,sub}){
  k=k||_g0; title=title||"Painel restrito"; sub=sub||"Digite a senha.";
  const [v,setV]=useState(""),[err,setErr]=useState(false);
  const [ipState,setIpState]=useState(cfg.ipcheck?"checking":"off"); // off | checking | allowed | denied
  const go=async()=>{ const h=await sha256hex(v); if(h && h===k){onOk();}else{setErr(true);setV("");} };
  useEffect(()=>{ let dead=false;
    if(!cfg.ipcheck){setIpState("off");return;}
    setIpState("checking");
    fetch(cfg.ipcheck,{cache:"no-store"}).then(r=>r.json()).then(d=>{ if(dead)return;
      if(d&&d.allowed){ setIpState("allowed"); onOk(); } else setIpState("denied");
    }).catch(()=>{ if(!dead)setIpState("denied"); });
    return ()=>{dead=true;};
  },[cfg.ipcheck]);
  if(ipState==="checking") return (<div style={{...card,textAlign:"center",padding:"34px 22px"}}><div style={{fontSize:30}}>🛰️</div><div style={{fontWeight:800,fontSize:16,marginTop:10}}>Verificando rede…</div></div>);
  if(ipState==="allowed") return null;
  return (<div style={{...card,textAlign:"center",padding:"34px 22px",animation:"slideup .25s ease"}}><div style={{fontSize:34}}>🔒</div><div style={{fontWeight:800,fontSize:18,marginTop:8}}>{title}</div><div style={{color:C.dim,fontSize:13,marginTop:4}}>{ipState==="denied"?"Fora da rede da empresa. Entre com a senha.":sub}</div><input type="password" inputMode="numeric" value={v} onChange={e=>{setV(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&go()} style={{...inp,marginTop:16,textAlign:"center",letterSpacing:6,fontWeight:700,maxWidth:220,marginLeft:"auto",marginRight:"auto"}} placeholder="••••"/>{err && <div style={{color:C.red,fontSize:13,marginTop:8,fontWeight:600}}>Senha incorreta</div>}<button onClick={go} style={{...btnBlue,marginTop:16,width:"auto",padding:"12px 30px"}}>Entrar</button></div>);
}

function NavMap({cfg,my,dist,eta,ok}){
  const wrap=useRef(null),map=useRef(null),line=useRef(null),route=useRef(null),prev=useRef(null),head=useRef(null),applied=useRef(0),routePos=useRef(null),sized=useRef(false);

    map.current=m; setTimeout(()=>m.invalidateSize(),250);
  },[]);
  useEffect(()=>{ const m=map.current; if(!m||!my)return;
    if(!sized.current){ m.invalidateSize(); sized.current=true; }
    const ll=[my.lat,my.lng]; m.panTo(ll,{animate:true,duration:1});
    if(line.current)line.current.remove();

    // recalcula a rota na 1ª vez e sempre que andar >150m (acompanha mudança de rua)
    const rp=routePos.current;

      fetch(`https://router.project-osrm.org/route/v1/driving/${my.lng},${my.lat};${cfg.lng},${cfg.lat}?overview=full&geometries=geojson`).then(r=>r.json()).then(d=>{const c=d&&d.routes&&d.routes[0]&&d.routes[0].geometry&&d.routes[0].geometry.coordinates; if(c&&map.current){const pts=c.map(q=>[q[1],q[0]]); if(route.current)route.current.remove(); route.current=window.L.polyline(pts,{color:C.blue,weight:7,opacity:.9,lineJoin:"round",lineCap:"round"}).addTo(map.current);} }).catch(()=>{});

function LiveMap({cfg,drivers}){
  const ref=useRef(null),map=useRef(null),markers=useRef({}),yard=useRef(null),ring=useRef(null);
  useEffect(()=>{ if(!window.L||!ref.current||map.current)return;
    const m=window.L.map(ref.current,{zoomControl:true,attributionControl:false}).setView([cfg.lat,cfg.lng],13);
    window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(m);
    const yIcon=window.L.divIcon({className:"",iconSize:[20,20],html:`<div style="background:${C.yellow};width:18px;height:18px;border-radius:4px;border:2px solid #333"></div>`});
    yard.current=window.L.marker([cfg.lat,cfg.lng],{icon:yIcon}).addTo(m).bindPopup(cfg.yardName);
    ring.current=window.L.circle([cfg.lat,cfg.lng],{radius:cfg.radius,color:C.green,fillColor:C.green,fillOpacity:.08,weight:1.5}).addTo(m);
    map.current=m; setTimeout(()=>m.invalidateSize(),250);
  },[]);
  useEffect(()=>{ if(ring.current){ring.current.setLatLng([cfg.lat,cfg.lng]);ring.current.setRadius(cfg.radius);} if(yard.current)yard.current.setLatLng([cfg.lat,cfg.lng]); },[cfg.lat,cfg.lng,cfg.radius]);
  useEffect(()=>{ const m=map.current; if(!m||!window.L)return; const seen={};
    drivers.forEach(d=>{ if(isNaN(d.lat)||isNaN(d.lng))return; seen[d.id]=1;
      const color=carrierColor(d.carrier); const op=d.status==="saiu"?.4:1; const bd=d.status==="chegou"?C.green:d.status==="saiu"?"#999":"#fff";
      const icon=window.L.divIcon({className:"",iconSize:[18,18],html:`<div style="background:${color};opacity:${op};width:14px;height:14px;border-radius:50%;border:2px solid ${bd};box-shadow:0 0 4px rgba(0,0,0,.4)"></div>`});
      const popup=`<b>${d.name}</b> <span style="background:${cyMeta(d.cycle).color};color:#fff;border-radius:4px;padding:1px 5px;font-size:10px">${d.cycle||"—"}</span><br>${d.carrier}<br>Rota: ${d.route||"-"}<br>${d.status==="saiu"?"🚪 Saiu do pátio":d.status==="chegou"?(d.galpao?"🏭 No galpão":"✓ No pátio"):"A caminho · ~"+(d.eta||etaStraight(d.dist))+" min"}`;
      if(markers.current[d.id]){markers.current[d.id].setLatLng([d.lat,d.lng]).setIcon(icon);markers.current[d.id].setPopupContent(popup);}
      else{markers.current[d.id]=window.L.marker([d.lat,d.lng],{icon}).addTo(m).bindPopup(popup);}
    });
    Object.keys(markers.current).forEach(id=>{ if(!seen[id]){m.removeLayer(markers.current[id]);delete markers.current[id];} });
  },[drivers]);
  return <div ref={ref} style={{height:320,borderRadius:10,overflow:"hidden",border:`1px solid ${C.line}`,boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}/>;
}

/* ============ MODIFICAR DADOS DO CHECK-IN (mesma sessão) ============ */
function EditModal({cur,onSave,onClose}){
  const [carrier,setCarrier]=useState(cur.carrier||"");
  const [route,setRoute]=useState(cur.route||"");
  const [cycle,setCycle]=useState(cur.cycle||"");
  const [saving,setSaving]=useState(false);
  const ready=carrier&&route.trim()&&cycle;
  const save=async()=>{ if(!ready||saving)return; setSaving(true); try{ await onSave({carrier,route:route.trim().toUpperCase(),cycle}); }catch(e){} setSaving(false); };
  return ReactDOM.createPortal((
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:100000,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",width:"100%",maxWidth:600,borderRadius:"18px 18px 0 0",padding:"18px 18px calc(env(safe-area-inset-bottom,0px) + 18px)",maxHeight:"90vh",overflowY:"auto",animation:"slideup .2s ease"}}>

        </div>
        <div style={{fontSize:12.5,color:C.dim,marginBottom:14}}>Corrija o ciclo, a transportadora ou a gaiola. Seu nome e o horário do check-in não mudam — a vaga/onda/senha são recalculadas.</div>
        <Field label="Motorista"><input style={{...inp,background:"#f3f4f6",color:C.dim}} value={cur.name||""} disabled/></Field>
        <Field label="Transportadora *">
          <select style={{...inp,appearance:"auto"}} value={carrier} onChange={e=>setCarrier(e.target.value)}>
            <option value="">Selecione…</option>
            {CARRIERS.map(c=><option key={c} value={c}>{c}</option>)}

        <Field label="Ciclo *">
          <div style={{display:"flex",gap:8}}>
            {CYCLES.filter(c=>!c.amb).map(c=>(
              <button key={c.k} onClick={()=>setCycle(c.k)} style={{flex:1,padding:"12px 0",borderRadius:8,border:`1.5px solid ${cycle===c.k?c.color:"#d9d9d9"}`,background:cycle===c.k?c.color:"#fff",color:cycle===c.k?"#fff":C.dim,fontWeight:800,fontSize:14,cursor:"pointer"}}>{c.k}</button>
            ))}
          </div>
          <button onClick={()=>setCycle("AMB")} style={{width:"100%",marginTop:8,padding:"12px 0",borderRadius:8,border:`1.5px solid ${cycle==="AMB"?C.red:"#d9d9d9"}`,background:cycle==="AMB"?C.red:"#fff",color:cycle==="AMB"?"#fff":C.dim,fontWeight:800,fontSize:13.5,cursor:"pointer"}}>🚑 Ambulância — estouro de cubagem</button>

/* ============ ATRASOS (dispatcher) ============ */
function DelaysScreen({cfg}){
  const [rows,setRows]=useState([]),[loaded,setLoaded]=useState(false),[view,setView]=useState("justificar"),[carF,setCarF]=useState(""),[cycF,setCycF]=useState(""),[jSub,setJSub]=useState("pend");
  const seq=useRef(0),busy=useRef(false);
  const pull=useCallback(()=>{ fbOnline(); },[]);
  useEffect(()=>{ if(!fbDB){ setLoaded(true); return; } fbOnline();
    const ref=fbDB.ref("ativos");
    const h=ref.on("value",snap=>{ setRows(fbRows(snap.val())); setLoaded(true); });
    return ()=>ref.off("value",h);
  },[]);

  // só chegados, com meta de horário
  const chegados=rows.filter(r=>(r.status==="chegou"||r.status==="saiu")&&r.arrTs);
  const comInfo=chegados.map(r=>({...r,d:delayInfo(r)})).filter(r=>r.d.meta!=null);
  const atrasados=comInfo.filter(r=>r.d.late);
  // motoristas ainda a caminho, mas já passou o horário-corte → atrasados (em rota)
  const emRota=rows.filter(r=>r.status==="a_caminho").map(r=>({...r,d:delayInfo(r)})).filter(r=>r.d.overdue);
  const transportadoras=[...new Set([...comInfo,...emRota].map(r=>r.carrier).filter(Boolean))].sort();
  const ciclos=[...new Set([...comInfo,...emRota].map(r=>r.cycle).filter(Boolean))].sort();
  const matchF=r=>(!carF||r.carrier===carF)&&(!cycF||r.cycle===cycF);
  const atrasadosF = atrasados.filter(matchF);
  const emRotaF = emRota.filter(matchF);
  // em rota + chegados atrasados, sem repetir o mesmo motorista (mesmo sid)
  const _seen={}; const listaJust = [...emRotaF, ...atrasadosF].filter(r=>{ if(_seen[r.id]) return false; _seen[r.id]=true; return true; });
  const pendList = listaJust.filter(r=>!r.justif);
  const justList = listaJust.filter(r=>r.justif);


  // resumo por ciclo
  const porCiclo=CYCLES.filter(c=>!c.amb).map(c=>{
    const itens=comInfo.filter(r=>r.cycle===c.k);
    const late=itens.filter(r=>r.d.status==="atrasado");
    const antec=itens.filter(r=>r.d.status==="antecipado");
    const somaAtraso=late.reduce((a,r)=>a+r.d.lateMin,0);
    return { k:c.k, color:c.color, total:itens.length, atras:late.length, antec:antec.length, ok:itens.length-late.length-antec.length, mediaAtraso: late.length?Math.round(somaAtraso/late.length):0 };
  }).filter(x=>x.total>0);

  // pontualidade por transportadora
  const mapaT={};
  comInfo.forEach(r=>{ const t=r.carrier||"—"; (mapaT[t]=mapaT[t]||{total:0,ok:0,antec:0,somaAtraso:0,nome:t}); mapaT[t].total++; if(r.d.status==="atrasado"){mapaT[t].somaAtraso+=r.d.lateMin;} else if(r.d.status==="antecipado"){mapaT[t].antec++;} else mapaT[t].ok++; });
  const ranking=Object.values(mapaT).map(t=>{ const late=t.total-t.ok-t.antec; return {...t, late, pont:t.total?Math.round(t.ok/t.total*100):0, mediaAtraso:late?Math.round(t.somaAtraso/late):0}; })
    .sort((a,b)=> b.pont-a.pont || a.mediaAtraso-b.mediaAtraso);

  const Tab=({k,l})=> <button onClick={()=>setView(k)} style={{flex:1,border:"none",cursor:"pointer",padding:"9px 4px",borderRadius:7,fontWeight:800,fontSize:12,background:view===k?C.blue:"#fff",color:view===k?"#fff":C.dim,boxShadow:view===k?"none":"0 1px 2px rgba(0,0,0,.06)"}}>{l}</button>;

  return (<div style={{animation:"slideup .25s ease"}}>
    <div style={{display:"flex",gap:6,marginBottom:12}}>
      <Tab k="justificar" l={`Justificativas (${pendList.length})`}/>
      <Tab k="ciclo" l="Por ciclo"/>
      <Tab k="transp" l="Pontualidade"/>
    </div>

    {!loaded && <div style={{...card,textAlign:"center",color:C.faint,padding:24,fontSize:13}}>Carregando…</div>}

    {loaded && view==="justificar" && <div>
      <div style={{display:"flex",gap:6,marginBottom:12,background:"#fff",padding:4,borderRadius:10,border:`1px solid ${C.line}`}}>
        <button onClick={()=>setJSub("pend")} style={{flex:1,border:"none",cursor:"pointer",padding:"9px 4px",borderRadius:7,fontWeight:800,fontSize:11.5,background:jSub==="pend"?C.red:"transparent",color:jSub==="pend"?"#fff":C.dim}}>Pendentes ({pendList.length})</button>
        <button onClick={()=>setJSub("just")} style={{flex:1,border:"none",cursor:"pointer",padding:"9px 4px",borderRadius:7,fontWeight:800,fontSize:11.5,background:jSub==="just"?C.green:"transparent",color:jSub==="just"?"#fff":C.dim}}>Justificadas ({justList.length})</button>
        <button onClick={()=>setJSub("periodo")} style={{flex:1,border:"none",cursor:"pointer",padding:"9px 4px",borderRadius:7,fontWeight:800,fontSize:11.5,background:jSub==="periodo"?C.blue:"transparent",color:jSub==="periodo"?"#fff":C.dim}}>Período</button>
      </div>

      {jSub==="periodo" ? <AnaliseJustificativas cfg={cfg}/> : <div>
        <div style={{fontSize:11,color:C.faint,fontWeight:700,margin:"0 2px 8px"}}>Situação de hoje, ao vivo.</div>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <select value={carF} onChange={e=>setCarF(e.target.value)} style={{...inp,appearance:"auto",flex:1,minWidth:0}}>
            <option value="">Todas as transportadoras</option>
            {transportadoras.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
          <select value={cycF} onChange={e=>setCycF(e.target.value)} style={{...inp,appearance:"auto",width:118,flexShrink:0}}>
            <option value="">Todos ciclos</option>
            {ciclos.map(k=><option key={k} value={k}>{k}</option>)}
          </select>
        </div>
        {jSub==="pend" && (pendList.length===0
          ? <div style={{...card,textAlign:"center",color:C.green,fontWeight:700,padding:26,fontSize:14}}>{(carF||cycF)?"Nenhuma rota pendente com esse filtro.":"Nenhuma rota pendente de justificativa."} 👏</div>
          : pendList.map(r=><DelayReadonly key={r.id} r={r}/>))}
        {jSub==="just" && (justList.length===0
          ? <div style={{...card,textAlign:"center",color:C.faint,padding:26,fontSize:14}}>Nenhuma justificativa registrada{(carF||cycF)?" com esse filtro":""} hoje ainda.</div>
          : justList.map(r=><DelayReadonly key={r.id} r={r}/>))}
      </div>}
    </div>}

    {loaded && view==="ciclo" && <div>
      {porCiclo.length===0 && <div style={{...card,textAlign:"center",color:C.faint,padding:26,fontSize:14}}>Sem chegadas com horário-meta ainda.</div>}
      {porCiclo.map(c=>(
        <div key={c.k} style={{...card,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12,borderLeft:`5px solid ${c.color}`}}>
          <div style={{flex:1}}>

function JustifyDispatcherScreen({cfg}){
  const [carrier,setCarrier]=useState("");

  useEffect(()=>{ if(!fbDB) return; fbOnline();
    const ref=fbDB.ref("ativos");
    const h=ref.on("value",snap=>setRows(fbRows(snap.val())));
    return ()=>ref.off("value",h);
  },[]);
  // pendências de justificativa por ciclo, só da transportadora escolhida
  const pendByCycle={};
  if(carrier){
    const atrasados=rows.filter(r=>(r.status==="chegou"||r.status==="saiu")&&r.arrTs).map(r=>({...r,d:delayInfo(r)})).filter(r=>r.d.meta!=null&&r.d.late);
    const emRota=rows.filter(r=>r.status==="a_caminho").map(r=>({...r,d:delayInfo(r)})).filter(r=>r.d.overdue);
    const _seen={};
    [...emRota,...atrasados].forEach(r=>{ if(_seen[r.id])return; _seen[r.id]=true; if(r.carrier!==carrier||r.justif)return; pendByCycle[r.cycle]=(pendByCycle[r.cycle]||0)+1; });

              return (<button key={c.k} onClick={()=>setCycle(c.k)} style={{position:"relative",flex:1,padding:"13px 0",borderRadius:8,border:`1.5px solid ${on?c.color:(carrier&&n?C.red:"#d9d9d9")}`,background:on?c.color:"#fff",color:on?"#fff":C.dim,fontWeight:800,fontSize:14,cursor:"pointer"}}>
                {c.k}
                {carrier && n>0 && <span style={{position:"absolute",top:-8,right:-7,minWidth:19,height:19,padding:"0 5px",borderRadius:10,background:C.red,color:"#fff",fontSize:11,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 1px 3px rgba(0,0,0,.25)"}}>{n}</span>}
              </button>);
            })}
          </div>
        </Field>
        {carrier
          ? (totalPend>0
              ? <div style={{fontSize:11.5,color:C.red,fontWeight:700,marginTop:4}}>● Os números em vermelho são atrasos pendentes de justificativa em cada ciclo.</div>
              : <div style={{fontSize:11.5,color:C.green,fontWeight:700,marginTop:4}}>Nenhuma pendência de justificativa nesta transportadora. 👏</div>)
          : <div style={{fontSize:11.5,color:C.faint,marginTop:4}}>Selecione os dois para entrar.</div>}
      </div>
    </div>);
  }
  return <JustifyScopedList carrier={carrier} cycle={cycle} onChange={()=>{setCarrier("");setCycle("");}}/>;
}

function JustifyScopedList({carrier,cycle,onChange}){
  const [rows,setRows]=useState([]),[loaded,setLoaded]=useState(false);
  const pull=useCallback(()=>{ fbOnline(); },[]);
  useEffect(()=>{ if(!fbDB){ setLoaded(true); return; } fbOnline();
    const ref=fbDB.ref("ativos");
    const h=ref.on("value",snap=>{ setRows(fbRows(snap.val())); setLoaded(true); });
    return ()=>ref.off("value",h);
  },[]);
  const chegados=rows.filter(r=>(r.status==="chegou"||r.status==="saiu")&&r.arrTs);
  const atrasados=chegados.map(r=>({...r,d:delayInfo(r)})).filter(r=>r.d.meta!=null&&r.d.late);
  const emRota=rows.filter(r=>r.status==="a_caminho").map(r=>({...r,d:delayInfo(r)})).filter(r=>r.d.overdue);
  const matchF=r=>r.carrier===carrier&&r.cycle===cycle;
  const _seen={}; const listaJust=[...emRota.filter(matchF),...atrasados.filter(matchF)].filter(r=>{ if(_seen[r.id])return false; _seen[r.id]=true; return true; });
  const pendN=listaJust.filter(r=>!r.justif).length;
  const justificar=async(r,cat,texto)=>{ try{ if(fbDB){ fbOnline(); await fbDB.ref("ativos/"+r.id).update({justifCat:cat,justif:texto}); await fbDB.ref("historico/"+todayStr()+"/"+r.id).update({justifCat:cat,justif:texto,nome:r.name||"",carrier:r.carrier||"",ciclo:r.cycle||"",rota:r.route||"",onda:r.onda||"",day:todayStr()}); } }catch(e){} };
  return (<div style={{animation:"slideup .25s ease"}}>
    <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
      <div style={{...inp,padding:"10px",flex:1,minWidth:0,background:"#f3f4f6",display:"flex",alignItems:"center",gap:6}}><span style={{width:9,height:9,borderRadius:"50%",background:carrierColor(carrier),flexShrink:0}}></span><span style={{fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{carrier}</span></div>
      <div style={{...inp,padding:"10px",width:74,flexShrink:0,background:"#f3f4f6",fontWeight:800,textAlign:"center"}}>{cycle}</div>
      <button onClick={onChange} style={linkBtn}>trocar</button>
    </div>
    {loaded && listaJust.length>0 && <div style={{fontSize:12,color:C.dim,fontWeight:700,margin:"0 2px 10px"}}><b style={{color:pendN?C.red:C.green}}>{pendN}</b> pendente(s) de {listaJust.length} atraso(s)</div>}
    {!loaded && <div style={{...card,textAlign:"center",color:C.faint,padding:24,fontSize:13}}>Carregando…</div>}
    {loaded && listaJust.length===0 && <div style={{...card,textAlign:"center",color:C.green,fontWeight:700,padding:26,fontSize:14}}>Nenhum atraso pra justificar agora. 👏</div>}
    {loaded && listaJust.map(r=><JustifyItem key={r.id} r={r} onSave={justificar}/>)}
    <div style={{textAlign:"center",marginTop:10}}><button onClick={pull} style={linkBtn}>↻ Atualizar</button></div>
  </div>);
}


/* ============ helpers de análise ============ */
function ymd(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function hmText(m){ if(m==null||isNaN(m))return"—"; m=Math.max(0,Math.round(m)); const h=Math.floor(m/60),mm=m%60; return h?`${h}h${String(mm).padStart(2,"0")}`:`${mm}min`; }
function durMin(a,b){ if(!a||!b)return null; const v=toMin(b)-toMin(a); return v>=0?v:null; }

function Donut({pct,size=118,stroke=15,color=C.green,track="#eef0f2",label,sub}){
  const r=(size-stroke)/2, cx=size/2, cy=size/2, circ=2*Math.PI*r;
  const off=circ*(1-Math.max(0,Math.min(100,pct))/100);
  return (<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke={track} strokeWidth={stroke}/>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={off} transform={`rotate(-90 ${cx} ${cy})`} style={{transition:"stroke-dashoffset .7s cubic-bezier(.2,.8,.2,1)"}}/>
    <text x={cx} y={cy} textAnchor="middle" dominantBaseline="central" fontSize={size*0.27} fontWeight="800" fill={C.text}>{label}</text>
    {sub&&<text x={cx} y={cy+size*0.2} textAnchor="middle" fontSize={size*0.097} fontWeight="700" fill={C.faint}>{sub}</text>}
  </svg>);
}
function Kpi({label,value,sub,color}){return(<div style={{flex:1,minWidth:0,background:"#fff",borderRadius:14,padding:"13px 12px",boxShadow:"0 1px 3px rgba(0,0,0,.06)",borderTop:`3px solid ${color}`}}><div style={{fontSize:25,fontWeight:800,color,lineHeight:1}}>{value}</div><div style={{fontSize:10,color:C.dim,fontWeight:800,textTransform:"uppercase",marginTop:5,letterSpacing:.2}}>{label}</div>{sub&&<div style={{fontSize:10,color:C.faint,marginTop:1}}>{sub}</div>}</div>);}
function HBar({name,color,value,max,right,sub}){const w=max?Math.max(3,Math.round(value/max*100)):0;return(<div style={{marginBottom:11}}>
  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
    <span style={{width:9,height:9,borderRadius:"50%",background:color,flexShrink:0}}></span>
    <span style={{flex:1,minWidth:0,fontSize:12.5,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{name}</span>
    <span style={{fontSize:11.5,color:C.dim,fontWeight:800,whiteSpace:"nowrap"}}>{right}</span>
  </div>
  <div style={{height:10,background:"#eef0f2",borderRadius:6,overflow:"hidden"}}><div style={{height:"100%",width:w+"%",background:color,borderRadius:6,transition:"width .7s cubic-bezier(.2,.8,.2,1)"}}></div></div>
  {sub&&<div style={{fontSize:10.5,color:C.faint,marginTop:3}}>{sub}</div>}
</div>);}
function SectionTitle({children,note}){return(<div style={{display:"flex",alignItems:"baseline",gap:8,margin:"18px 2px 10px"}}><span style={{fontSize:13,fontWeight:800,color:C.text,letterSpacing:.2}}>{children}</span>{note&&<span style={{fontSize:11.5,color:C.faint,fontWeight:600}}>{note}</span>}</div>);}

function AnaliseJustificativas({cfg}){
  const hoje=new Date(); const semana=new Date(hoje.getTime()-6*864e5);
  const [from,setFrom]=useState(ymd(semana)),[to,setTo]=useState(ymd(hoje));
  const [rows,setRows]=useState(null),[loading,setLoading]=useState(false),[err,setErr]=useState("");
  const [carF,setCarF]=useState("");
  const buscar=async()=>{ setLoading(true); setErr("");
    try{ const r=await fbHistRows(from,to); setRows(r); }
    catch(e){ setErr("Não consegui buscar o histórico."); } setLoading(false); };
  useEffect(()=>{ buscar(); },[]);
  const fmtDia=d=>String(d||"").split("-").reverse().join("/");

  const all=(rows||[]).filter(r=>r.justif||r.justifCat);
  const transp=[...new Set(all.map(r=>r.carrier).filter(Boolean))].sort();
  const list=(carF?all.filter(r=>r.carrier===carF):all).slice().sort((a,b)=>String(b.dia).localeCompare(String(a.dia))||String(a.carrier).localeCompare(String(b.carrier)));
  const byCat={}; list.forEach(r=>{ const c=r.justifCat||"Sem categoria"; byCat[c]=(byCat[c]||0)+1; });
  const cats=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);

  const baixar=()=>{
    const esc=s=>`"${String(s==null?"":s).replace(/"/g,'""')}"`;
    const head=["Data","Transportadora","Ciclo","Rota","Onda","Chegada","Atraso (min)","Categoria","Justificativa"];
    const lines=[head.map(esc).join(",")];
    list.forEach(r=>{ lines.push([fmtDia(r.dia),r.carrier,r.ciclo,r.rota,r.onda,r.chegada||"",(r.atraso!==""&&r.atraso!=null)?r.atraso:"",r.justifCat,r.justif].map(esc).join(",")); });
    const csv="\ufeff"+lines.join("\r\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a");
    a.href=url; a.download=`justificativas_${from}_a_${to}.csv`; document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },300);
  };

  return (<div>
    <div style={{...card,padding:"12px 14px",marginBottom:12}}>
      <div style={{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:115}}><div style={{fontSize:10.5,color:C.faint,fontWeight:700,marginBottom:3,textTransform:"uppercase"}}>De</div><input type="date" value={from} onChange={e=>setFrom(e.target.value)} style={{...inp,appearance:"auto",padding:"9px 10px"}}/></div>
        <div style={{flex:1,minWidth:115}}><div style={{fontSize:10.5,color:C.faint,fontWeight:700,marginBottom:3,textTransform:"uppercase"}}>Até</div><input type="date" value={to} onChange={e=>setTo(e.target.value)} style={{...inp,appearance:"auto",padding:"9px 10px"}}/></div>
        <button onClick={buscar} style={{...btnBlue,width:"auto",padding:"10px 18px"}}>Buscar</button>
      </div>
    </div>
    {loading && <div style={{...card,textAlign:"center",color:C.faint,padding:24,fontSize:13}}>Carregando histórico…</div>}
    {err && <div style={{...card,textAlign:"center",color:C.red,padding:18,fontSize:13}}>{err}</div>}
    {rows && !loading && all.length===0 && <div style={{...card,textAlign:"center",color:C.faint,padding:26,fontSize:14}}>Nenhuma justificativa nesse período.</div>}

    {rows && !loading && all.length>0 && <div style={{animation:"slideup .3s ease"}}>
      <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
        <select value={carF} onChange={e=>setCarF(e.target.value)} style={{...inp,appearance:"auto",flex:1,minWidth:0}}>
          <option value="">Todas as transportadoras</option>
          {transp.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
        <button onClick={baixar} style={{...btnGreen,width:"auto",padding:"10px 14px",fontSize:13,whiteSpace:"nowrap"}}>⬇ Baixar CSV</button>
      </div>

      <SectionTitle note={`${list.length} no período`}>Por categoria</SectionTitle>

/* ============ QR: gerar (motorista) e ler (operação) ============ */
function QRCode({text,size=230}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    if(!window.qrcode){ ref.current.innerHTML='<div style="font-family:monospace;font-size:13px;word-break:break-all;padding:12px;border:1px dashed #bbb;border-radius:10px;color:#666">'+String(text)+'</div>'; return; }
    try{
      const qr=window.qrcode(0,'M'); qr.addData(String(text),'Byte'); qr.make();
      const n=qr.getModuleCount(); const cell=Math.max(2,Math.floor(size/(n+8))); const margin=cell*4; const dim=cell*n+margin*2;
      let rects="";
      for(let r=0;r<n;r++) for(let c=0;c<n;c++) if(qr.isDark(r,c)) rects+='<rect x="'+(margin+c*cell)+'" y="'+(margin+r*cell)+'" width="'+cell+'" height="'+cell+'"/>';
      ref.current.innerHTML='<svg width="'+dim+'" height="'+dim+'" viewBox="0 0 '+dim+' '+dim+'" xmlns="http://www.w3.org/2000/svg"><rect width="'+dim+'" height="'+dim+'" fill="#fff"/><g fill="#111">'+rects+'</g></svg>';
    }catch(e){ ref.current.innerHTML='<div style="font-family:monospace;font-size:13px;color:#666">'+String(text)+'</div>'; }
  },[text,size]);
  return <div ref={ref} style={{lineHeight:0,display:"inline-block"}}/>;
}

function QRScanner({onScan,onClose}){
  const videoRef=useRef(null),canvasRef=useRef(null),rafRef=useRef(null),streamRef=useRef(null);
  const [err,setErr]=useState(""),[manual,setManual]=useState("");
  useEffect(()=>{
    let dead=false;
    if(!window.jsQR){ setErr("O leitor de QR não carregou (verifique a internet). Use o código manual abaixo."); return; }
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){ setErr("Câmera indisponível neste aparelho. Use o código manual."); return; }
    navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"}}}).then(stream=>{
      if(dead){ stream.getTracks().forEach(t=>t.stop()); return; }
      streamRef.current=stream; const v=videoRef.current; if(!v) return;
      v.srcObject=stream; v.setAttribute("playsinline","true"); v.play().catch(()=>{});
      const tick=()=>{
        if(dead) return;
        const v=videoRef.current,cv=canvasRef.current;
        if(v&&cv&&v.readyState>=2&&v.videoWidth){
          const w=v.videoWidth,h=v.videoHeight; cv.width=w; cv.height=h;
          const ctx=cv.getContext("2d",{willReadFrequently:true}); ctx.drawImage(v,0,0,w,h);
          try{ const img=ctx.getImageData(0,0,w,h); const code=window.jsQR(img.data,w,h,{inversionAttempts:"dontInvert"});
            if(code&&code.data){ onScan(code.data); return; } }catch(e){}
        }
        rafRef.current=requestAnimationFrame(tick);
      };
      rafRef.current=requestAnimationFrame(tick);
    }).catch(()=>{ setErr("Não consegui abrir a câmera. Permita o acesso ou use o código manual."); });
    return ()=>{ dead=true; if(rafRef.current)cancelAnimationFrame(rafRef.current); if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop()); };
  },[]);
  return ReactDOM.createPortal((
    <div style={{position:"fixed",inset:0,zIndex:100002,background:"#000",display:"flex",flexDirection:"column"}}>
      <div style={{position:"relative",flex:1,overflow:"hidden"}}>
        <video ref={videoRef} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}} muted playsInline/>
        <canvas ref={canvasRef} style={{display:"none"}}/>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
          <div style={{width:"66%",maxWidth:280,aspectRatio:"1 / 1",border:"3px solid #fff",borderRadius:18,boxShadow:"0 0 0 9999px rgba(0,0,0,.45)"}}/>
        </div>
        <div style={{position:"absolute",top:"calc(env(safe-area-inset-top,0px) + 14px)",left:0,right:0,textAlign:"center",color:"#fff",fontWeight:800,fontSize:16,textShadow:"0 1px 3px rgba(0,0,0,.6)"}}>📷 Aponte para o QR de saída</div>
      </div>
      <div style={{background:"#fff",padding:"16px 16px calc(env(safe-area-inset-bottom,0px) + 16px)"}}>
        {err && <div style={{color:C.orange,fontSize:13,fontWeight:700,marginBottom:10,textAlign:"center"}}>{err}</div>}
        <div style={{display:"flex",gap:8}}>
          <input value={manual} onChange={e=>setManual(e.target.value)} placeholder="ou digite o código do QR" style={{...inp,flex:1}}/>
          <button onClick={()=>manual.trim()&&onScan(manual.trim())} style={{...btnBlue,width:"auto",padding:"0 18px"}}>OK</button>
        </div>
        <button onClick={onClose} style={{...btnGhost,marginTop:10}}>Fechar</button>
      </div>
    </div>), document.body);
}

/* ============ OPERAÇÃO — CHAMADA DE MOTORISTAS (coordenação) ============ */
function OperacaoScreen({cfg}){
  const [rows,setRows]=useState([]),[loaded,setLoaded]=useState(false),[expected,setExpected]=useState([]);
  const [cyF,setCyF]=useState(""),[carF,setCarF]=useState(""),[open,setOpen]=useState({}),[flash,setFlash]=useState({});
  const [scan,setScan]=useState(false),[toast,setToast]=useState(null);
  const [,tick]=useState(0);
  useEffect(()=>{ const t=setInterval(()=>tick(x=>x+1),15000); return ()=>clearInterval(t); },[]);
  useEffect(()=>{ if(!fbDB){ setLoaded(true); return; } fbOnline();
    const ref=fbDB.ref("ativos");
    const h=ref.on("value",snap=>{ setRows(fbRows(snap.val())); setLoaded(true); });
    return ()=>ref.off("value",h);
  },[]);
  useEffect(()=>{ if(!cfg.webapp)return; jsonp(cfg.webapp+(cfg.webapp.includes("?")?"&":"?")+"routes=1").then(d=>setExpected(((d&&d.routes)||[]).filter(e=>!carrierHidden(e.carrier)))).catch(()=>{}); },[cfg.webapp]);

  const _nc=s=>String(s||"").trim().toUpperCase();
  const ondaMap={}; expected.forEach(e=>{ if(e.onda!=null&&e.onda!=="") ondaMap[e.cycle+"|"+_nc(e.route)]=e.onda; });
  const ondaNumX=o=>{ const m=String(o==null?"":o).match(/\d+/); return m?parseInt(m[0],10):null; };
  const ondaOf=r=>{ let o=r.onda; if(!o) o=ondaMap[r.cycle+"|"+_nc(r.route)]; return o||""; };

  const baseWaiting=rows.filter(r=>r.status==="chegou" && !r.galpao);
  const ciclos=CYCLES.map(c=>c.k).filter(k=>baseWaiting.some(r=>r.cycle===k));
  const carriers=[...new Set(baseWaiting.map(r=>r.carrier).filter(Boolean))].sort();
  const waiting=baseWaiting.filter(r=>(!cyF||r.cycle===cyF)&&(!carF||r.carrier===carF));

  const groups={};
  waiting.forEach(r=>{ const n=ondaNumX(ondaOf(r)); const key=(n==null?"sem":String(n)); (groups[key]=groups[key]||[]).push(r); });
  const ondaKeys=Object.keys(groups).sort((a,b)=>{ if(a==="sem")return 1; if(b==="sem")return -1; return (+a)-(+b); });
  Object.values(groups).forEach(arr=>arr.sort((a,b)=>String(a.vaga||"zzz").localeCompare(String(b.vaga||"zzz"),undefined,{numeric:true})));

  const chamar=(drivers)=>{ if(!fbDB||!drivers.length) return; fbOnline();
    const ts=Date.now(); const ups={};
    drivers.forEach(d=>{ ups["ativos/"+d.id+"/chamado"]=ts; ups["ativos/"+d.id+"/chamadoTs"]=ts; });
    try{ fbDB.ref().update(ups); }catch(e){}
    try{ const day=todayStr(); drivers.forEach(d=>{ fbDB.ref("historico/"+day+"/"+d.id).update({chamadoTs:ts}); }); }catch(e){}
    const f={}; drivers.forEach(d=>f[d.id]=ts); setFlash(x=>({...x,...f})); setTimeout(()=>setFlash({}),1600);
  };
  const chamarOnda=(key,drivers)=>{ if(!drivers.length)return; const label=key==="sem"?"sem onda":("Onda "+key); if(window.confirm(`Chamar todos da ${label}? (${drivers.length} motorista(s))`)) chamar(drivers); };

  // ===== vagas compartilhadas entre ondas: detecta vaga livre e o próximo da fila =====
  const _vkey=r=>r.cycle+"|"+String(r.vaga||"").trim().toUpperCase();
  const vagaSeq={}; rows.forEach(r=>{ if(!r.vaga) return; (vagaSeq[_vkey(r)]=vagaSeq[_vkey(r)]||[]).push(r); });
  Object.values(vagaSeq).forEach(arr=>arr.sort((a,b)=>((ondaNumX(ondaOf(a))||999)-(ondaNumX(ondaOf(b))||999))||((a.arrTs||0)-(b.arrTs||0))));
  // próximo motorista aguardando na mesma vaga+ciclo, de onda posterior a quem saiu
  const nextForVaga=(drv)=>{ if(!drv||!drv.vaga) return null; const arr=vagaSeq[_vkey(drv)]||[]; const myOnda=ondaNumX(ondaOf(drv))||0;
    return arr.filter(r=>r.status==="chegou"&&!r.galpao&&(ondaNumX(ondaOf(r))||0)>myOnda).sort((a,b)=>(ondaNumX(ondaOf(a))||0)-(ondaNumX(ondaOf(b))||0))[0]||null; };
  // vagas que ficaram livres (alguém saiu) e têm um próximo aguardando
  const freed=[];
  Object.keys(vagaSeq).forEach(k=>{ const arr=vagaSeq[k]; const left=arr.filter(r=>r.status==="saiu"); if(!left.length) return;
    const lastLeft=left.sort((a,b)=>(a.ts||0)-(b.ts||0))[left.length-1];
    const nx=nextForVaga(lastLeft); if(!nx) return;
    freed.push({vaga:nx.vaga,cycle:nx.cycle,onda:ondaNumX(ondaOf(nx)),driver:nx,called:!!nx.chamado}); });
  const freedShown=freed.filter(f=>(!cyF||f.cycle===cyF)&&(!carF||f.driver.carrier===carF))
    .sort((a,b)=>String(a.vaga).localeCompare(String(b.vaga),undefined,{numeric:true}));

  const showToast=(t)=>{ setToast(t); setTimeout(()=>setToast(null),4200); };
  const callNext=(drv,ctx)=>{ const nx=nextForVaga(drv); if(!nx){ showToast({ok:false,msg:`Vaga ${drv.vaga||"?"} livre — nenhum motorista da próxima onda aguardando nela.`}); return; }
    chamar([nx]); showToast({ok:true,msg:`Vaga ${nx.vaga} · chamado ${nx.name} (Onda ${ondaNumX(ondaOf(nx))||"?"})${ctx?" · "+ctx:""}`}); };

  // leitura do QR de saída (câmera ou coletor handheld) → 2º check + chama a próxima onda daquela vaga
  const onScan=(raw)=>{ setScan(false);
    let sid=String(raw||"").trim(); if(sid.indexOf("CPX:")===0) sid=sid.slice(4); else if(sid.indexOf("CPX|")===0) sid=sid.slice(4);
    const drv=rows.find(r=>r.id===sid);
    if(!drv){ showToast({ok:false,msg:"QR não reconhecido (motorista não está no dia de hoje)."}); return; }
    if(fbDB){ fbOnline(); const ts=Date.now(); const u={check2:ts}; if(drv.status!=="saiu"){ u.status="saiu"; u.saidaTs=drv.saidaTs||ts; }
      try{ fbDB.ref("ativos/"+drv.id).update(u); fbDB.ref("historico/"+todayStr()+"/"+drv.id).update({saidaConfTs:ts}); }catch(e){} }
    const nx=nextForVaga(drv);
    if(nx){ chamar([nx]); showToast({ok:true,msg:`✓ Saída conferida — ${drv.name}. Vaga ${nx.vaga}: chamado ${nx.name} (Onda ${ondaNumX(ondaOf(nx))||"?"}).`}); }
    else { showToast({ok:true,msg:`✓ Saída conferida — ${drv.name}. Vaga ${drv.vaga||"?"} livre, sem próxima onda aguardando.`}); }
  };
  const onScanRef=useRef(onScan); onScanRef.current=onScan;
  // coletor de mão (handheld): ele "digita" o código e dá Enter — capturamos como bipagem
  useEffect(()=>{ let buf="", last=0;
    const onKey=(e)=>{ const tag=e.target&&e.target.tagName; if(tag==="INPUT"||tag==="SELECT"||tag==="TEXTAREA") return;
      const now=Date.now(); if(now-last>120) buf=""; last=now;
      if(e.key==="Enter"){ if(buf.length>=3) onScanRef.current(buf); buf=""; return; }
      if(e.key&&e.key.length===1) buf+=e.key; };
    document.addEventListener("keydown",onKey);
    return ()=>document.removeEventListener("keydown",onKey);
  },[]);

  const totalWaiting=waiting.length;
  const bell=(color)=>(<span style={{fontSize:16,lineHeight:1}}>🔔</span>);

  return (<div style={{animation:"slideup .25s ease"}}>
    <div style={{...card,padding:"14px 16px",marginBottom:12,borderLeft:`5px solid ${C.blue}`}}>
      <div style={{fontWeight:800,fontSize:17}}>📣 Chamar motoristas</div>
      <div style={{fontSize:12.5,color:C.dim,marginTop:4,lineHeight:1.5}}>Toque no sino de uma onda para chamar todos dela, ou abra a onda e chame uma gaiola específica. O motorista recebe um aviso na hora.</div>
      <div style={{fontSize:12,color:C.dim,marginTop:6,lineHeight:1.5}}>Bipe o QR de saída pela <b>câmera</b> ou pelo <b>coletor de mão</b> (é só disparar o coletor com esta aba aberta): a bipagem faz o <b>2º check</b> da saída e chama a próxima onda da vaga.</div>
      <button onClick={()=>setScan(true)} style={{...btnBlue,marginTop:12,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>📷 Bipar QR de saída → chamar próxima onda</button>
    </div>

    {scan && <QRScanner onScan={onScan} onClose={()=>setScan(false)}/>}
    {toast && ReactDOM.createPortal(
      <div style={{position:"fixed",left:16,right:16,bottom:"calc(env(safe-area-inset-bottom,0px) + 20px)",zIndex:100003,display:"flex",justifyContent:"center",pointerEvents:"none"}}>
        <div style={{maxWidth:520,width:"100%",background:toast.ok?C.green:"#333",color:"#fff",borderRadius:12,padding:"14px 16px",fontWeight:700,fontSize:13.5,boxShadow:"0 6px 20px rgba(0,0,0,.3)",textAlign:"center",animation:"pop .25s ease"}}>{toast.ok?"✓ ":"⚠ "}{toast.msg}</div>
      </div>, document.body)}

    <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"center",flexWrap:"wrap"}}>
      <span style={{fontSize:11.5,fontWeight:800,color:C.dim,marginRight:2}}>Ciclo:</span>
      <button onClick={()=>setCyF("")} style={{padding:"6px 12px",borderRadius:20,border:`1.5px solid ${cyF===""?C.blue:"#d9d9d9"}`,background:cyF===""?C.blue:"#fff",color:cyF===""?"#fff":C.dim,fontWeight:800,fontSize:12,cursor:"pointer"}}>Todos</button>
      {ciclos.map(k=>{const a=cyF===k;const cm=cyMeta(k);return <button key={k} onClick={()=>setCyF(a?"":k)} style={{padding:"6px 12px",borderRadius:20,border:`1.5px solid ${a?cm.color:"#d9d9d9"}`,background:a?cm.color:"#fff",color:a?"#fff":C.dim,fontWeight:800,fontSize:12,cursor:"pointer"}}>{k}</button>;})}
    </div>
    {carriers.length>0 && <select value={carF} onChange={e=>setCarF(e.target.value)} style={{...inp,appearance:"auto",padding:"10px",marginBottom:10}}>
      <option value="">Todas as transportadoras</option>
      {carriers.map(t=><option key={t} value={t}>{t}</option>)}
    </select>}

    <div style={{display:"flex",gap:10,marginBottom:12}}>
      <Stat label="No pátio" value={totalWaiting} color={C.green}/>
      <Stat label="Ondas" value={ondaKeys.length} color={C.blue}/>
      <Stat label="Chamados" value={waiting.filter(r=>r.chamado).length} color={C.orange}/>
    </div>

    {!loaded && <div style={{...card,textAlign:"center",color:C.faint,padding:24,fontSize:13}}>Carregando…</div>}
    {loaded && totalWaiting===0 && <div style={{...card,textAlign:"center",color:C.faint,padding:26,fontSize:14}}>Ninguém no pátio aguardando chamada agora.</div>}

    {loaded && freedShown.length>0 && <div style={{marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:800,color:C.orange,textTransform:"uppercase",letterSpacing:.3,margin:"0 2px 8px"}}>🅿️ Vaga livre — chamar próxima onda</div>
      {freedShown.map(f=>(
        <div key={f.cycle+"|"+f.vaga} style={{...card,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12,borderLeft:`5px solid ${f.called?C.green:C.orange}`,background:f.called?"#f4fff8":"#fffaf4"}}>
          <span style={{minWidth:56,textAlign:"center",background:C.orange,color:"#fff",borderRadius:9,padding:"9px 4px",fontWeight:800,fontSize:17,lineHeight:1}}>{f.vaga}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:800,fontSize:13.5}}>Vaga {f.vaga} vazia · próxima é a Onda {f.onda||"?"}</div>
            <div style={{fontSize:12,color:C.dim,marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{f.driver.name} · {f.driver.carrier}</div>
            {f.called && <div style={{fontSize:11,color:C.green,fontWeight:700,marginTop:2}}>✅ já chamado às {t2hm(f.driver.chamado)}</div>}
          </div>
          <button onClick={()=>callNext(f.driver)} style={{display:"flex",alignItems:"center",gap:6,border:"none",borderRadius:10,padding:"11px 15px",background:f.called?C.green:C.orange,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>🔔 {f.called?"Chamar de novo":"Chamar"}</button>
        </div>
      ))}
    </div>}

    {loaded && ondaKeys.map(key=>{ const list=groups[key]; const isOpen=!!open[key]; const chamados=list.filter(r=>r.chamado).length; const label=key==="sem"?"Sem onda":("Onda "+key);
      return (<div key={key} style={{...card,padding:0,marginBottom:10,overflow:"hidden",borderLeft:`5px solid ${chamados===list.length?C.green:C.blue}`}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 14px"}}>
          <button onClick={()=>setOpen(o=>({...o,[key]:!o[key]}))} style={{flex:1,display:"flex",alignItems:"center",gap:10,border:"none",background:"none",cursor:"pointer",padding:0,textAlign:"left"}}>
            <span style={{fontSize:14,color:C.dim,width:14}}>{isOpen?"▾":"▸"}</span>
            <span style={{fontWeight:800,fontSize:16}}>{label}</span>
            <span style={{background:C.blue,color:"#fff",borderRadius:12,padding:"2px 10px",fontWeight:800,fontSize:12.5}}>{list.length}</span>
            {chamados>0 && <span style={{background:"#eafff1",color:C.green,border:`1px solid ${C.green}`,borderRadius:12,padding:"1px 8px",fontWeight:800,fontSize:11}}>{chamados} chamado(s)</span>}
          </button>
          <button onClick={()=>chamarOnda(key,list)} style={{display:"flex",alignItems:"center",gap:7,border:"none",borderRadius:10,padding:"11px 15px",background:C.green,color:"#fff",fontWeight:800,fontSize:13.5,cursor:"pointer",whiteSpace:"nowrap",boxShadow:"0 2px 6px rgba(0,166,80,.3)"}}>{bell()} Chamar onda</button>
        </div>
        {isOpen && <div style={{padding:"0 12px 12px"}}>
          {list.map(r=>{ const cm=cyMeta(r.cycle); const isFlash=!!flash[r.id]; const wasCalled=!!r.chamado;
            return (<div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 10px",marginTop:8,borderRadius:10,background:isFlash?"#eafff1":"#fafafa",border:`1px solid ${isFlash?C.green:"#eee"}`,transition:"background .4s"}}>
              <span style={{minWidth:52,textAlign:"center",background:r.vaga?C.blue:"#e5e5e5",color:r.vaga?"#fff":C.faint,borderRadius:8,padding:"8px 4px",fontWeight:800,fontSize:16,lineHeight:1}}>{r.vaga||"—"}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontWeight:800,fontSize:13.5,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.name}</span><span style={{fontSize:9.5,fontWeight:800,color:"#fff",background:cm.color,borderRadius:4,padding:"1px 5px"}}>{r.cycle||"—"}</span></div>
                <div style={{fontSize:11.5,color:C.dim,marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.carrier} · Gaiola {r.route}</div>
                {wasCalled && <div style={{fontSize:11,color:C.green,fontWeight:700,marginTop:2}}>✅ chamado às {t2hm(r.chamado)}</div>}
              </div>
              <button onClick={()=>chamar([r])} style={{display:"flex",alignItems:"center",gap:5,border:`1.5px solid ${wasCalled?C.green:C.blue}`,borderRadius:9,padding:"9px 12px",background:wasCalled?"#eafff1":"#fff",color:wasCalled?C.green:C.blue,fontWeight:800,fontSize:12.5,cursor:"pointer",whiteSpace:"nowrap"}}>{bell()} {wasCalled?"Chamar de novo":"Chamar"}</button>
            </div>);
          })}
        </div>}
      </div>);
    })}

    <div style={{textAlign:"center",marginTop:10}}><button onClick={()=>fbOnline()} style={linkBtn}>↻ Atualizar</button></div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
